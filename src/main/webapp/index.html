<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Largest Number Finder</title>

    <!-- External CSS File -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
          rel="stylesheet">
</head>

<body>

    <div class="wrapper">

        <div class="card">

            <header>
                <h1>Comparison Tool</h1>

                <p class="subtitle">
                    Identify the largest value among three inputs
                </p>
            </header>

            <main>

                <form action="Largest" method="get">

                    <div class="form-group">

                        <label for="n1">First Number</label>

                        <div class="input-wrapper">

                            <input type="number"
                                   id="n1"
                                   name="n1"
                                   placeholder="Enter first number"
                                   required>

                        </div>

                    </div>

                    <div class="form-group">

                        <label for="n2">Second Number</label>

                        <div class="input-wrapper">

                            <input type="number"
                                   id="n2"
                                   name="n2"
                                   placeholder="Enter second number"
                                   required>

                        </div>

                    </div>

                    <div class="form-group">

                        <label for="n3">Third Number</label>

                        <div class="input-wrapper">

                            <input type="number"
                                   id="n3"
                                   name="n3"
                                   placeholder="Enter third number"
                                   required>

                        </div>

                    </div>

                    <button type="submit">
                        Find Largest Number
                    </button>

                </form>

            </main>

        </div>

        <footer>
            <p>&copy; 2026 Largest Number Finder</p>
        </footer>

    </div>

</body>

</html>
